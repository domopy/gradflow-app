name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify

  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Export Android bundle
        run: npx expo export --platform android --output-dir "$RUNNER_TEMP/gradflow-android"
      - name: Export iOS bundle
        run: npx expo export --platform ios --output-dir "$RUNNER_TEMP/gradflow-ios"
      - name: Export Web bundle
        run: npx expo export --platform web --output-dir "$RUNNER_TEMP/gradflow-web"
